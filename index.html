<!DOCTYPE html>
<html>
    <head>
        <script async src="https://www.googletagmanager.com/gtag/js?id=G-62FD0S6112"></script>
        <script>
            window.dataLayer = window.dataLayer || [];
            function gtag(){dataLayer.push(arguments);}
            gtag('js', new Date());
            gtag('config', 'G-62FD0S6112');
        </script>

        <title>MetroNerds</title>
        <link rel="icon" type="image/png" href="favicon.png">
        <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" />
        <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
       <header class="cabecalho-app">
            
            <div class="linha-do-titulo">
                
                <div class="container-menu">
                    <button id="btn-menu-modos" class="btn-modos">🎮 Modos</button>
                    
                    <ul id="dropdown-modos" class="dropdown-modos escondido">
                        <li id="opcao-padrao" class="opcao-modo">✨ Padrão</li>
                        <li id="opcao-sprint" class="opcao-modo">⏱️ 100 Segundos</li>
                    </ul>
                </div>
                
                <h1>MetroNerds</h1>
                
                <span id="indicador-modo" class="modo-texto">✨ Padrão</span>
                
            </div>

            <div class="faixa-cores-base"></div>
            
        </header>

        <div id="painel-sprint" class="escondido">
            <div class="status-sprint">
                <span id="tempo-sprint">⏳ 100s</span>
                <span id="placar-sprint">✅ 0 | ⏭️ 0 | ❌ 0</span>
            </div>
            <button id="btn-pular">⏭️ Pular</button>
        </div>

        <div id="mapaDiv"></div>

        <script src="dados.js"></script>
        <script type="module" src="game.js"></script>

        <div id="controles">
            <div class="input-container">
                <input type="text" id="palpiteInput" placeholder="Digite o nome da estação ou linha..." inputmode="none">
                <ul id="lista-sugestoes" class="escondido"></ul>
            </div>
            <button id="btn-enviar">Enviar</button>
        </div> 

        <div id="painel-resultados">
            <div id="lista-palpites"></div>
        </div>

        <div id="teclado-virtual" class="teclado-virtual">
            <div class="linha-teclado">
                <button class="tecla">Q</button><button class="tecla">W</button><button class="tecla">E</button><button class="tecla">R</button><button class="tecla">T</button><button class="tecla">Y</button><button class="tecla">U</button><button class="tecla">I</button><button class="tecla">O</button><button class="tecla">P</button>
            </div>
            <div class="linha-teclado">
                <button class="tecla">A</button><button class="tecla">S</button><button class="tecla">D</button><button class="tecla">F</button><button class="tecla">G</button><button class="tecla">H</button><button class="tecla">J</button><button class="tecla">K</button><button class="tecla">L</button>
            </div>
            <div class="linha-teclado">
                <button class="tecla">Z</button><button class="tecla">X</button><button class="tecla">C</button><button class="tecla">V</button><button class="tecla">B</button><button class="tecla">N</button><button class="tecla">M</button>
                <button class="tecla tecla-acao" id="tecla-apagar">⌫</button> 
            </div>
            <div class="linha-teclado">
                <button class="tecla tecla-espaco" id="tecla-espaco">Espaço</button>
                <button class="tecla">-</button>
            </div>
        </div>
        
        <div id="modal-vitoria" class="modal-overlay escondido">
            <div class="modal-conteudo">
                <span id="modal-emoji" class="emoji-vitoria">🎉</span>
                <h2 id="modal-titulo">VOCÊ CONSEGUIU!</h2>
                <p id="texto-vitoria">A estação secreta era <strong id="nome-estacao-alvo">---</strong>.</p>
                
                <div class="estatisticas-vitoria">
                    <div class="estat-item">
                        <span id="contagem-palpites">0</span>
                        <p id="label-palpites">Palpites</p>
                    </div>
                    <div class="estat-item">
                        <span id="contagem-extra">--</span>
                        <p id="label-extra">Tempo</p>
                    </div>
                </div>

                <button id="btn-jogar-novamente" class="btn-jogar-novamente">JOGAR NOVAMENTE</button>
            </div>
        </div>
    </body> 
</html>
